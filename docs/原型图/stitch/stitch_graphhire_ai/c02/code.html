<p class="font-body text-on-surface-variant text-sm">欢迎回来，请输入您的登录凭证进入管理控制台。</p>

<form action="/company/dashboard" class="space-y-6" method="GET">
<!-- Email/Mobile Field -->
<div>
<label class="block font-label text-sm font-medium text-on-surface mb-1.5" for="username">手机号码或企业邮箱</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="person">person</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 bg-surface-container-low text-on-surface font-body text-sm rounded border-0 border-b-2 border-transparent focus:bg-surface-container-lowest focus:border-primary focus:ring-0 transition-colors placeholder:text-outline/70" id="username" name="username" placeholder="admin@company.com" required="" type="text"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-1.5">
<label class="block font-label text-sm font-medium text-on-surface" for="password">密码</label>
<a class="font-label text-xs font-medium text-primary hover:text-primary-container transition-colors" href="#">忘记密码？</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 bg-surface-container-low text-on-surface font-body text-sm rounded border-0 border-b-2 border-transparent focus:bg-surface-container-lowest focus:border-primary focus:ring-0 transition-colors placeholder:text-outline/70" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface-variant transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="h-4 w-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-surface bg-surface-container-lowest" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm font-body text-on-surface-variant" for="remember-me">
                        在此设备上保持登录
                    </label>
</div>
