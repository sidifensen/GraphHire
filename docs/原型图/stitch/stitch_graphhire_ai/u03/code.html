<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GraphHire - 注册</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#faf8ff",
                        "on-error-container": "#93000a",
                        "on-primary-fixed-variant": "#003ea8",
                        "tertiary-fixed-dim": "#ffb95f",
                        "surface-container-high": "#e2e7ff",
                        "surface-container-low": "#f2f3ff",
                        "primary-fixed-dim": "#b4c5ff",
                        "secondary-container": "#6cf8bb",
                        "primary-container": "#2563eb",
                        "on-secondary-fixed": "#002113",
                        "on-primary-fixed": "#00174b",
                        "on-tertiary-fixed-variant": "#653e00",
                        "surface-bright": "#faf8ff",
                        "surface-variant": "#dae2fd",
                        "inverse-on-surface": "#eef0ff",
                        "on-surface-variant": "#434655",
                        "outline-variant": "#c3c6d7",
                        "inverse-primary": "#b4c5ff",
                        "on-primary-container": "#eeefff",
                        "on-secondary-container": "#00714d",
                        "surface-container": "#eaedff",
                        "on-secondary": "#ffffff",
                        "background": "#faf8ff",
                        "tertiary": "#784b00",
                        "on-surface": "#131b2e",
                        "on-tertiary-fixed": "#2a1700",
                        "outline": "#737686",
                        "error": "#ba1a1a",
                        "on-secondary-fixed-variant": "#005236",
                        "surface-tint": "#0053db",
                        "primary": "#004ac6",
                        "error-container": "#ffdad6",
                        "surface-dim": "#d2d9f4",
                        "on-tertiary": "#ffffff",
                        "secondary-fixed-dim": "#4edea3",
                        "on-primary": "#ffffff",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#dae2fd",
                        "tertiary-fixed": "#ffddb8",
                        "on-background": "#131b2e",
                        "inverse-surface": "#283044",
                        "tertiary-container": "#996100",
                        "primary-fixed": "#dbe1ff",
                        "surface-container-lowest": "#ffffff",
                        "secondary-fixed": "#6ffbbe",
                        "secondary": "#006c49",
                        "on-tertiary-container": "#ffeedd"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #faf8ff; /* surface */
            color: #131b2e; /* on-surface */
        }
        h1, h2, h3, h4, h5, h6, .font-headline {
            font-family: 'Manrope', sans-serif;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 relative overflow-hidden">
<!-- Decorative Background Elements -->
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-surface-variant rounded-full blur-3xl opacity-50 z-0"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-surface-container-high rounded-full blur-3xl opacity-40 z-0"></div>
<div class="relative z-10 w-full max-w-6xl grid grid-cols-1 lg:grid-cols-2 gap-12 lg:gap-24 items-center">
<!-- Left: Editorial / Branding -->
<div class="hidden lg:flex flex-col gap-8">
<div>
<h1 class="font-headline text-primary font-bold text-4xl mb-2 tracking-tight">GraphHire</h1>
<p class="text-on-surface-variant font-body text-lg">AI 驱动的人才图谱重塑招聘体验</p>
</div>
<div class="bg-surface-container-low p-8 rounded-full">
<p class="font-headline text-3xl font-semibold leading-tight mb-6 text-on-surface">发现潜力，<br/>精准匹配。</p>
<div class="flex flex-col gap-4">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
<p class="text-on-surface-variant font-body">深度技能图谱分析</p>
</div>
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">insights</span>
</div>
<p class="text-on-surface-variant font-body">智能职业发展推荐</p>
</div>
</div>
</div>
</div>
<!-- Right: Registration Form -->
<div class="bg-surface-container-lowest p-10 rounded-full shadow-[0px_20px_50px_rgba(19,27,46,0.06)] relative overflow-hidden">
<!-- Glassmorphism subtle overlay -->
<div class="absolute inset-0 bg-surface/70 backdrop-blur-xl -z-10"></div>
<h2 class="font-headline text-3xl font-bold mb-8 text-on-surface">创建您的账户</h2>
<!-- Role Selection (Tab Style) -->
<div class="flex gap-4 mb-8">
<button class="flex-1 py-3 px-6 rounded-xl bg-surface-container-highest text-primary font-label font-medium transition-colors border-b-2 border-primary">
                    我是求职者
                </button>
<button class="flex-1 py-3 px-6 rounded-xl bg-surface-container-low text-on-surface-variant font-label font-medium hover:bg-surface-container-high transition-colors text-center border-b-2 border-transparent">
                    我是招聘者
                </button>
</div>
<form class="flex flex-col gap-6">
<!-- Mobile Field -->
<div>
<label class="block text-on-surface-variant font-label text-sm mb-2 uppercase tracking-wide">手机号码</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">smartphone</span>
<input class="w-full bg-surface-container-low text-on-surface pl-12 pr-4 py-3 rounded-xl focus:bg-surface-container-lowest focus:outline-none border-b-2 border-transparent focus:border-primary transition-all font-body" placeholder="请输入手机号码" type="tel"/>
</div>
</div>
<!-- Verification Code -->
<div>
<label class="block text-on-surface-variant font-label text-sm mb-2 uppercase tracking-wide">验证码</label>
<div class="flex gap-4">
<div class="relative flex-1">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">mark_email_read</span>
<input class="w-full bg-surface-container-low text-on-surface pl-12 pr-4 py-3 rounded-xl focus:bg-surface-container-lowest focus:outline-none border-b-2 border-transparent focus:border-primary transition-all font-body" placeholder="请输入验证码" type="text"/>
</div>
<button class="bg-surface-container-high text-on-primary-fixed-variant px-6 rounded-xl font-label font-medium hover:bg-surface-variant transition-colors whitespace-nowrap" type="button">
                            获取验证码
                        </button>
</div>
</div>
<!-- Password -->
<div>
<label class="block text-on-surface-variant font-label text-sm mb-2 uppercase tracking-wide">设置密码</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full bg-surface-container-low text-on-surface pl-12 pr-12 py-3 rounded-xl focus:bg-surface-container-lowest focus:outline-none border-b-2 border-transparent focus:border-primary transition-all font-body" placeholder="请输入密码" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div>
<label class="block text-on-surface-variant font-label text-sm mb-2 uppercase tracking-wide">确认密码</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock_reset</span>
<input class="w-full bg-surface-container-low text-on-surface pl-12 pr-4 py-3 rounded-xl focus:bg-surface-container-lowest focus:outline-none border-b-2 border-transparent focus:border-primary transition-all font-body" placeholder="请再次输入密码" type="password"/>
</div>
</div>
<!-- Terms -->
<div class="flex items-start gap-3 mt-2">
<div class="flex items-center h-5">
<input class="w-4 h-4 rounded text-primary bg-surface-container-low border-transparent focus:ring-primary focus:ring-offset-surface" type="checkbox"/>
</div>
<label class="font-body text-sm text-on-surface-variant leading-tight">
                        我已阅读并同意 <a class="text-primary hover:underline" href="#">服务条款</a> 和 <a class="text-primary hover:underline" href="#">隐私政策</a>
</label>
</div>
<!-- Submit Button -->
<button class="mt-4 w-full bg-gradient-to-r from-primary to-primary-container text-on-primary py-4 rounded-xl font-label font-bold text-lg hover:shadow-lg hover:shadow-primary/20 transition-all flex items-center justify-center gap-2" type="button">
                    立即注册
                    <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
<div class="text-center mt-4">
<p class="font-body text-sm text-on-surface-variant">已有账号？ <a class="text-primary font-medium hover:underline" href="/login">去登录</a></p>
</div>
</form>
</div>
</div>
</body></html>
