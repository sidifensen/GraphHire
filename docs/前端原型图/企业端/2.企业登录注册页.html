<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>企业登录/注册 - GraphHire</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-primary": "#b4c5ff",
                      "tertiary": "#394851",
                      "surface-container-highest": "#d5e4fa",
                      "on-surface": "#0e1c2c",
                      "surface-bright": "#f8f9ff",
                      "on-background": "#0e1c2c",
                      "surface-dim": "#cddbf1",
                      "surface-container": "#e5eeff",
                      "inverse-on-surface": "#eaf1ff",
                      "surface-variant": "#d5e4fa",
                      "on-tertiary-fixed-variant": "#394952",
                      "on-tertiary-fixed": "#0d1d25",
                      "error-container": "#ffdad6",
                      "tertiary-fixed": "#d4e5f0",
                      "primary-container": "#0052d9",
                      "on-primary-container": "#cbd6ff",
                      "primary-fixed-dim": "#b4c5ff",
                      "on-primary": "#ffffff",
                      "secondary-fixed-dim": "#b8c4ff",
                      "on-primary-fixed-variant": "#003ea8",
                      "on-secondary-fixed-variant": "#0737b8",
                      "inverse-surface": "#243142",
                      "tertiary-container": "#506069",
                      "on-primary-fixed": "#00174b",
                      "outline": "#737686",
                      "on-secondary-fixed": "#001354",
                      "surface-tint": "#0353da",
                      "on-error-container": "#93000a",
                      "secondary-fixed": "#dde1ff",
                      "primary": "#003da6",
                      "on-secondary-container": "#fffbff",
                      "surface": "#f8f9ff",
                      "tertiary-fixed-dim": "#b8c9d3",
                      "surface-container-high": "#dbe9ff",
                      "surface-container-low": "#eef4ff",
                      "on-secondary": "#ffffff",
                      "secondary": "#2d50cd",
                      "secondary-container": "#4a6ae7",
                      "outline-variant": "#c3c6d7",
                      "surface-container-lowest": "#ffffff",
                      "on-error": "#ffffff",
                      "on-tertiary": "#ffffff",
                      "background": "#f8f9ff",
                      "error": "#ba1a1a",
                      "on-surface-variant": "#434654",
                      "primary-fixed": "#dbe1ff",
                      "on-tertiary-container": "#c9dae5"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {},
              "fontFamily": {
                      "headline": [
                              "Manrope", "sans-serif"
                      ],
                      "body": [
                              "Inter", "PingFang SC", "Microsoft YaHei", "sans-serif"
                      ],
                      "label": [
                              "Inter", "sans-serif"
                      ]
              }
      },
          },
        }
      </script>
<style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        /* Custom input styles for Cognitive Curator guidelines */
        .ds-input {
            background-color: theme('colors.surface');
            color: theme('colors.on-surface');
            border-radius: theme('borderRadius.DEFAULT');
            padding: 0.75rem 1rem;
            width: 100%;
            font-family: theme('fontFamily.body');
            font-size: 0.875rem;
            border: none;
            outline: none;
            position: relative;
            transition: all 0.2s ease;
        }
        .ds-input:focus {
            box-shadow: 0 2px 0 0 theme('colors.primary');
            background-color: theme('colors.surface-container-lowest');
        }
      </style>
</head>
<body class="bg-surface font-body antialiased text-on-surface min-h-screen flex selection:bg-primary selection:text-white">
<!-- Left Branding Canvas (Cognitive Curator Aesthetic) -->
<div class="hidden lg:flex w-5/12 bg-surface-container-low relative flex-col justify-between p-16 overflow-hidden">
<!-- Abstract Nodes Background Effect -->
<div class="absolute top-[-10%] left-[-10%] w-[120%] h-[120%] opacity-40 pointer-events-none" style="background: radial-gradient(circle at 20% 30%, rgba(0, 61, 166, 0.1) 0%, transparent 40%), radial-gradient(circle at 80% 70%, rgba(0, 82, 217, 0.08) 0%, transparent 50%);"></div>
<!-- Header / Logo -->
<div class="relative z-10">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">hub</span>
<span class="font-headline font-bold text-2xl text-primary tracking-tight">GraphHire</span>
</div>
</div>
<!-- Main Copy -->
<div class="relative z-10 mb-24">
<h1 class="font-headline font-bold text-4xl lg:text-5xl leading-[1.1] text-on-surface tracking-tight mb-8">
                AI 驱动的精准招聘，<br/>
<span class="text-primary">助力企业构建人才图谱</span>
</h1>
<p class="font-body text-tertiary text-lg leading-relaxed max-w-md">
                打破传统简历筛选的噪音，通过深度认知计算和多维图谱网络，为您精准匹配具备核心潜力的未来人才。
            </p>
</div>
<!-- Footer / Decorative -->
<div class="relative z-10 flex items-center gap-4 text-sm text-outline">
<span class="material-symbols-outlined text-xl">psychology</span>
<span>Enterprise Cognitive Recruiting System</span>
</div>
</div>
<!-- Right Form Canvas -->
<div class="w-full lg:w-7/12 flex items-center justify-center p-6 sm:p-12 lg:p-24 bg-surface relative">
<!-- Form Container Card (Ambient Shadow) -->
<div class="w-full max-w-[480px] bg-surface-container-lowest rounded-xl p-8 sm:p-10 shadow-[0_12px_32px_-4px_rgba(14,28,44,0.06)] relative z-10">
<!-- Mobile Logo (Visible only on small screens) -->
<div class="flex lg:hidden items-center gap-2 mb-8 justify-center">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">hub</span>
<span class="font-headline font-bold text-xl text-primary tracking-tight">GraphHire</span>
</div>
<!-- Tabs: Login / Register -->
<div class="flex gap-8 mb-10 border-b-2 border-surface-container pb-2">
<div class="pb-2 cursor-pointer font-headline text-lg font-medium text-tertiary hover:text-on-surface transition-colors">
                    企业登录
                </div>
<div class="pb-2 cursor-pointer font-headline text-lg font-bold text-primary relative">
                    快速注册
                    <!-- Active Indicator -->
<div class="absolute -bottom-[10px] left-0 w-full h-[3px] bg-primary rounded-t-full"></div>
</div>
</div>
<!-- Registration Form Fields -->
<div class="space-y-5">
<!-- Company Name -->
<div>
<label class="block font-label text-xs font-medium text-on-surface-variant mb-1.5 ml-1">公司名称</label>
<input class="ds-input" placeholder="请输入企业全称" type="text"/>
</div>
<!-- Social Credit Code -->
<div>
<label class="block font-label text-xs font-medium text-on-surface-variant mb-1.5 ml-1">统一社会信用代码</label>
<input class="ds-input" placeholder="18位营业执照代码" type="text"/>
</div>
<!-- Contact Name -->
<div>
<label class="block font-label text-xs font-medium text-on-surface-variant mb-1.5 ml-1">联系人姓名</label>
<input class="ds-input" placeholder="请输入真实姓名" type="text"/>
</div>
<!-- Phone & Verification -->
<div class="space-y-5">
<div>
<label class="block font-label text-xs font-medium text-on-surface-variant mb-1.5 ml-1">手机号</label>
<div class="flex gap-3">
<input class="ds-input flex-1" placeholder="请输入11位手机号" type="tel"/>
<button class="whitespace-nowrap px-4 py-2 bg-surface-container-high text-primary font-body text-sm font-medium rounded-DEFAULT hover:bg-surface-tint/10 transition-colors" type="button">
                                获取验证码
                            </button>
</div>
</div>
<div>
<label class="block font-label text-xs font-medium text-on-surface-variant mb-1.5 ml-1">验证码</label>
<input class="ds-input" placeholder="请输入6位验证码" type="text"/>
</div>
</div>
<!-- Submit Action -->
<div class="pt-4">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-semibold text-base py-3.5 rounded-lg shadow-sm hover:opacity-95 transition-opacity flex justify-center items-center gap-2">
                        快速注册
                        <span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
<!-- System Hint -->
<div class="mt-6 flex items-start gap-2 bg-surface-container-low p-3 rounded-lg">
<span class="material-symbols-outlined text-primary text-[18px] mt-0.5">info</span>
<p class="font-body text-xs text-tertiary leading-relaxed">
                        新用户注册后需完成企业认证以发布职位。认证过程将由 AI 辅助快速审核。
                    </p>
</div>
</div>
</div>
</div>
</body></html>
