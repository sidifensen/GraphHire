spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/graphhire_dev
    username: postgres
    password: postgres

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    root: DEBUG
    com.graphhire: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
