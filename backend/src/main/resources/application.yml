server:
  port: 7777

spring:
  application:
    name: graphhire-backend
  autoconfigure:
    exclude: []
  config:
    import: optional:file:.env,optional:file:backend/.env

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://localhost:5432/graphhire}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

  servlet:
    multipart:
      enabled: true
      max-file-size: ${app.upload.resume.max-file-size:10MB}
      max-request-size: ${app.upload.resume.max-file-size:10MB}

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:example@qq.com}
    password: ${MAIL_PASSWORD:placeholder}
    properties:
      mail:
        smtp:
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT_MS:8000}
          timeout: ${MAIL_TIMEOUT_MS:8000}
          writetimeout: ${MAIL_WRITE_TIMEOUT_MS:8000}
          auth: true
          starttls:
            enable: false
            required: false
          ssl:
            enable: true

# Sa-Token Configuration
sa-token:
  token-name: satoken
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
  # 允许自定义 Token
  allow-customize-token: true
  # 允许刷新 Token
  allow-refresh-token: true
  # Refresh Token 有效期（秒），默认 7 天
  refresh-token-timeout: 604800

# MyBatis-Plus Configuration
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.graphhire.domain.model
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# RocketMQ Configuration
rocketmq:
  enabled: true
  name-server: 127.0.0.1:9876
  producer:
    group: graphhire-producer-group

# AI Configuration
ai:
  provider: deepseek
  deepseek:
    enabled: ${DEEPSEEK_ENABLED:true}
    api-key: ${DEEPSEEK_API_KEY:}
    url: https://api.deepseek.com/v1
    timeout-ms: ${DEEPSEEK_TIMEOUT_MS:30000}
    retry:
      max-attempts: ${DEEPSEEK_RETRY_MAX_ATTEMPTS:2}
      backoff-ms: ${DEEPSEEK_RETRY_BACKOFF_MS:200}


  parser:
    ocr:
      enabled: true
      provider: aliyun
      fallback-min-text-length: 20
      aliyun:
        access-key-id: ${ALIYUN_OCR_ACCESS_KEY_ID:}
        access-key-secret: ${ALIYUN_OCR_ACCESS_KEY_SECRET:}
        endpoint: ocr-api.cn-hangzhou.aliyuncs.com
        type: General
# RustFS Configuration
rustfs:
  endpoint: ${RUSTFS_ENDPOINT:http://localhost:9000}
  access-key: ${RUSTFS_ACCESS_KEY:}
  secret-key: ${RUSTFS_SECRET_KEY:}
  bucket: ${RUSTFS_BUCKET:resumes}

# Memgraph Configuration
memgraph:
  enabled: ${MEMGRAPH_ENABLED:true}
  bolt-url: bolt://localhost:7687
  username:
  password:

# Logging Configuration
logging:
  level:
    root: INFO
    com.graphhire: INFO
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

app:
  upload:
    resume:
      max-file-size: 10MB
      allowed-extensions: [pdf, doc, docx]
      allowed-mime-types:
        - application/pdf
        - application/msword
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document
    avatar:
      max-file-size: 2MB
  logging:
    slow-api-threshold-ms: ${SLOW_API_THRESHOLD_MS:500}

management:
  health:
    neo4j:
      enabled: false
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

# springdoc-openapi 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    filter: true
    display-request-duration: true

