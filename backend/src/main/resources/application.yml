server:
  port: 7777

spring:
  application:
    name: graphhire-backend
  autoconfigure:
    exclude: []

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/graphhire
    username: postgres
    password: postgres
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000


  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 2
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: -1ms

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      write-dates-as-timestamps: false

  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_USERNAME:example@qq.com}
    password: ${MAIL_PASSWORD:placeholder}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            enable: true

# Sa-Token Configuration
sa-token:
  token-name: satoken
  timeout: 86400
  active-timeout: -1
  is-concurrent: true
  is-share: false
  token-style: uuid
  is-log: false
  # 允许自定义 Token
  allow-customize-token: true
  # 允许刷新 Token
  allow-refresh-token: true
  # Refresh Token 有效期（秒），默认 7 天
  refresh-token-timeout: 604800

# MyBatis-Plus Configuration
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.graphhire.domain.model
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# RocketMQ Configuration
rocketmq:
  enabled: true
  name-server: 127.0.0.1:9876
  producer:
    group: graphhire-producer-group

# AI Configuration
ai:
  provider: deepseek
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    url: https://api.deepseek.com/v1


  parser:
    ocr:
      enabled: true
      provider: tencent
      fallback-min-text-length: 20
      tencent:
        secret-id: ${TENCENT_OCR_SECRET_ID:}
        secret-key: ${TENCENT_OCR_SECRET_KEY:}
        region: ap-guangzhou
      aliyun:
        access-key-id: ${ALIYUN_OCR_ACCESS_KEY_ID:}
        access-key-secret: ${ALIYUN_OCR_ACCESS_KEY_SECRET:}
        endpoint: ocr-api.cn-hangzhou.aliyuncs.com
# RustFS Configuration
rustfs:
  endpoint: http://localhost:9000
  access-key: rustfsadmin
  secret-key: rustfsadmin
  bucket: resumes

# Memgraph Configuration
memgraph:
  bolt-url: bolt://localhost:7687
  username:
  password:

# Logging Configuration
logging:
  level:
    root: INFO
    com.graphhire: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n'

# springdoc-openapi 配置
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    filter: true
    display-request-duration: true

