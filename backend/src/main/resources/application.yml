# =========================
# 基础运行配置
# =========================
server: # 内置 Web 服务器配置
  port: 7777 # 服务监听端口

spring: # Spring Boot 核心配置
  application: # 应用基础信息
    name: graphhire-backend # 应用名称（用于日志/注册中心标识）
  config: # 外部配置导入
    import: optional:file:.env,optional:file:backend/.env # 按顺序加载环境变量文件（存在则加载）
  autoconfigure: # 自动装配控制
    exclude: [] # 排除自动装配类（为空表示不排除）

  datasource: # 数据库数据源配置（PostgreSQL + HikariCP）
    driver-class-name: org.postgresql.Driver # JDBC 驱动类
    url: ${DB_URL:jdbc:postgresql://localhost:5432/graphhire} # 数据库连接地址（优先环境变量）
    username: ${DB_USERNAME:postgres} # 数据库用户名
    password: ${DB_PASSWORD:postgres} # 数据库密码
    hikari: # Hikari 连接池参数
      minimum-idle: 5 # 最小空闲连接数
      maximum-pool-size: 20 # 连接池最大连接数
      connection-timeout: 30000 # 获取连接超时时间（毫秒）
      idle-timeout: 600000 # 连接最大空闲时间（毫秒）
      max-lifetime: 1800000 # 连接最大生命周期（毫秒）

  data: # Spring Data 相关配置
    redis: # Redis 配置
      host: localhost # Redis 主机地址
      port: 6379 # Redis 端口
      password: # Redis 密码（留空表示无密码）
      database: 0 # Redis 库索引
      timeout: 10000ms # 命令超时时间
      lettuce: # Lettuce 客户端配置
        pool: # 连接池配置
          min-idle: 5 # 最小空闲连接数
          max-idle: 10 # 最大空闲连接数
          max-active: 20 # 最大活跃连接数
          max-wait: -1ms # 获取连接最大等待时间（-1 表示不限）

  jackson: # JSON 序列化配置
    date-format: yyyy-MM-dd HH:mm:ss # 日期时间格式
    time-zone: GMT+8 # 时区设置
    serialization: # 序列化策略
      write-dates-as-timestamps: false # 日期使用字符串而非时间戳

  servlet: # Servlet 容器配置
    multipart: # 文件上传配置
      enabled: true # 启用 multipart 上传
      max-file-size: ${app.upload.resume.max-file-size:10MB} # 单个文件大小上限
      max-request-size: ${app.upload.resume.max-file-size:10MB} # 单次请求总大小上限

  mail: # 邮件发送配置
    host: smtp.qq.com # SMTP 服务器地址
    port: 465 # SMTP 端口（SSL）
    username: ${MAIL_USERNAME:example@qq.com} # 邮箱账号
    password: ${MAIL_PASSWORD:placeholder} # 邮箱授权码/密码
    properties: # JavaMail 扩展属性
      mail: # mail 属性根节点
        smtp: # SMTP 协议参数
          auth: true # 启用身份认证
          connectiontimeout: ${MAIL_CONNECTION_TIMEOUT_MS:8000} # 建连超时（毫秒）
          timeout: ${MAIL_TIMEOUT_MS:8000} # 读超时（毫秒）
          writetimeout: ${MAIL_WRITE_TIMEOUT_MS:8000} # 写超时（毫秒）
          starttls: # STARTTLS 配置
            enable: false # 不启用 STARTTLS
            required: false # 不强制 STARTTLS
          ssl: # SSL 配置
            enable: true # 启用 SSL

app: # 自定义业务配置
  upload: # 上传相关配置
    avatar: # 头像上传配置
      max-file-size: 2MB # 头像单文件大小上限
    resume: # 简历上传配置
      max-file-size: 10MB # 简历单文件大小上限
      allowed-extensions: [pdf, doc, docx] # 允许的文件扩展名
      allowed-mime-types: # 允许的 MIME 类型列表
        - application/pdf # PDF 文档类型
        - application/msword # DOC 文档类型
        - application/vnd.openxmlformats-officedocument.wordprocessingml.document # DOCX 文档类型
    chat-image:
      max-file-size: 5MB
      allowed-extensions: [jpg, jpeg, png, gif, webp]
      allowed-mime-types:
        - image/jpeg
        - image/png
        - image/gif
        - image/webp
    rate-limit:
      enabled: true
      key-prefix: upload:rate-limit
      scenes:
        resume:
          enabled: true
          user:
            capacity: 20
            refill-tokens: 20
            refill-seconds: 60
          global:
            capacity: 400
            refill-tokens: 400
            refill-seconds: 60
        person-avatar:
          enabled: true
          user:
            capacity: 10
            refill-tokens: 10
            refill-seconds: 60
          global:
            capacity: 200
            refill-tokens: 200
            refill-seconds: 60
        company-avatar:
          enabled: true
          user:
            capacity: 10
            refill-tokens: 10
            refill-seconds: 60
          global:
            capacity: 200
            refill-tokens: 200
            refill-seconds: 60
        chat-image:
          enabled: true
          user:
            capacity: 20
            refill-tokens: 20
            refill-seconds: 60
          global:
            capacity: 2000
            refill-tokens: 2000
            refill-seconds: 60
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8888}
    websocket:
      allowed-origins: ${WS_ALLOWED_ORIGINS:http://localhost:8888}
  logging: # 业务日志配置
    slow-api-threshold-ms: ${SLOW_API_THRESHOLD_MS:500} # 慢接口阈值（毫秒）
  mq:
    resume-parse:
      consume-thread-number: 20
      consume-thread-max: 64
    resume-match:
      consume-thread-number: 8
      consume-thread-max: 32
    resume-upload:
      consume-thread-number: 8
      consume-thread-max: 32

# =========================
# 中间件与业务集成
# =========================
sa-token: # Sa-Token 认证配置
  token-name: satoken # Token 名称（请求头/参数名）
  token-style: uuid # Token 风格
  timeout: 86400 # Token 有效期（秒）
  active-timeout: -1 # 活跃超时（-1 表示不限制）
  auto-renew: true # 临近过期自动续期
  is-concurrent: true # 允许同账号并发登录
  is-share: false # 多端是否共享同一 Token
  allow-customize-token: true # 允许自定义 Token
  is-log: false # 是否输出 Sa-Token 日志

mybatis-plus: # MyBatis-Plus 配置
  mapper-locations: classpath*:/mapper/**/*.xml # Mapper XML 扫描路径
  type-aliases-package: com.graphhire.domain.model # 实体别名包路径
  configuration: # MyBatis 原生配置
    cache-enabled: false # 关闭二级缓存
    map-underscore-to-camel-case: true # 下划线字段自动映射驼峰属性
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl # SQL 日志实现
  global-config: # MyBatis-Plus 全局配置
    db-config: # 数据库相关全局配置
      id-type: assign_id # 主键生成策略
      logic-delete-field: deleted # 逻辑删除标记字段
      logic-delete-value: 1 # 逻辑已删除值
      logic-not-delete-value: 0 # 逻辑未删除值

ai: # AI 能力配置
  provider: deepseek # 默认 AI 服务提供商
  deepseek: # DeepSeek 提供商配置
    enabled: ${DEEPSEEK_ENABLED:true} # 是否启用 DeepSeek
    api-key: ${DEEPSEEK_API_KEY:} # DeepSeek API Key
    url: https://api.deepseek.com/v1 # DeepSeek 接口基地址
    timeout-ms: ${DEEPSEEK_TIMEOUT_MS:30000} # 请求超时（毫秒）
    retry: # 调用重试配置
      max-attempts: ${DEEPSEEK_RETRY_MAX_ATTEMPTS:2} # 最大重试次数
      backoff-ms: ${DEEPSEEK_RETRY_BACKOFF_MS:200} # 重试退避间隔（毫秒）
  parser: # 文档解析配置
    ocr: # OCR 识别配置
      enabled: true # 启用 OCR
      provider: aliyun # OCR 服务提供商
      fallback-min-text-length: 20 # 文本长度低于该值时触发 OCR 兜底
      aliyun: # 阿里云 OCR 配置
        access-key-id: ${ALIYUN_OCR_ACCESS_KEY_ID:} # 阿里云 AccessKey ID
        access-key-secret: ${ALIYUN_OCR_ACCESS_KEY_SECRET:} # 阿里云 AccessKey Secret
        endpoint: ocr-api.cn-hangzhou.aliyuncs.com # OCR 服务接入域名
        type: General # OCR 识别类型

rocketmq: # RocketMQ 消息队列配置
  enabled: true # 启用 RocketMQ
  name-server: 127.0.0.1:9876 # NameServer 地址
  producer: # 生产者配置
    group: graphhire-producer-group # 生产者组名

rustfs: # RustFS 对象存储配置
  endpoint: ${RUSTFS_ENDPOINT:http://localhost:9000} # RustFS 服务地址
  access-key: ${RUSTFS_ACCESS_KEY:} # 访问密钥 Access Key
  secret-key: ${RUSTFS_SECRET_KEY:} # 访问密钥 Secret Key
  bucket: ${RUSTFS_BUCKET:resumes} # 默认存储桶
  http:
    socket-timeout-ms: ${RUSTFS_SOCKET_TIMEOUT_MS:5000}
    connection-timeout-ms: ${RUSTFS_CONNECTION_TIMEOUT_MS:5000}
    api-call-timeout-ms: ${RUSTFS_API_CALL_TIMEOUT_MS:5000}
    api-call-attempt-timeout-ms: ${RUSTFS_API_CALL_ATTEMPT_TIMEOUT_MS:5000}
    max-connections: ${RUSTFS_HTTP_MAX_CONNECTIONS:128}
    connection-acquire-timeout-ms: ${RUSTFS_CONNECTION_ACQUIRE_TIMEOUT_MS:3000}
    connection-time-to-live-ms: ${RUSTFS_CONNECTION_TTL_MS:600000}
    expect-continue-enabled: ${RUSTFS_EXPECT_CONTINUE_ENABLED:true}

memgraph: # Memgraph 图数据库配置
  enabled: ${MEMGRAPH_ENABLED:true} # 是否启用 Memgraph
  bolt-url: bolt://localhost:7687 # Bolt 协议连接地址
  username: # Memgraph 用户名（可留空）
  password: # Memgraph 密码（可留空）

# =========================
# 可观测性与接口文档
# =========================
logging: # 日志配置
  level: # 日志级别配置
    root: INFO # 根日志级别
    com.graphhire: INFO # 项目包日志级别
  pattern: # 日志输出格式
    console: '%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n' # 控制台日志格式

management: # Actuator 监控配置
  health: # 健康检查配置
    neo4j: # Neo4j 健康检查项
      enabled: false # 关闭 Neo4j 健康检查
  endpoints: # 端点暴露配置
    web: # Web 暴露配置
      exposure: # 暴露白名单
        include: health,info,metrics,prometheus # 对外暴露的端点
  endpoint: # 单个端点细粒度配置
    health: # 健康端点配置
      show-details: when_authorized # 仅授权后显示健康详情

springdoc: # SpringDoc OpenAPI 配置
  api-docs: # OpenAPI 文档接口配置
    path: /v3/api-docs # API 文档 JSON 路径
  swagger-ui: # Swagger UI 配置
    path: /swagger-ui.html # Swagger UI 访问路径
    doc-expansion: none # 默认折叠文档
    filter: true # 启用接口筛选框
    tags-sorter: alpha # 标签按字母排序
    operations-sorter: alpha # 接口按字母排序
    display-request-duration: true # 显示请求耗时
