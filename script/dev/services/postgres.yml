name: postgres-stack

services:
  postgres:
    container_name: postgres
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_DB=ragent
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
